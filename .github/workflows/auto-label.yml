name: Auto-label PRs

# Applies labels automatically based on:
#   • the target branch (feature→dev vs dev→main)
#   • which files changed in the PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── Label by target branch ─────────────────────────────────────────────
      - name: Label by target branch
        uses: actions/github-script@v7
        with:
          script: |
            const base = context.payload.pull_request.base.ref;
            const labelsToAdd = [];

            if (base === 'dev') {
              labelsToAdd.push('feature-branch');
            } else if (base === 'main') {
              labelsToAdd.push('release');
            }

            // ── Label by changed files ─────────────────────────────────────
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
              }
            );
            const filenames = files.map(f => f.filename);

            const appChanged     = filenames.some(f => f === 'app.py');
            const schemaChanged  = filenames.some(f => f.startsWith('resource/app_schema'));
            const utilsChanged   = filenames.some(f => f.startsWith('utils/'));
            const docsChanged    = filenames.some(f => f === 'README.md' || f.startsWith('docs/'));
            const testerChanged  = filenames.some(f => f.startsWith('resource/tester_files/'));
            const cssChanged     = filenames.some(f => f.startsWith('css/'));

            if (appChanged)    labelsToAdd.push('app');
            if (schemaChanged) labelsToAdd.push('schema');
            if (utilsChanged)  labelsToAdd.push('utils');
            if (docsChanged)   labelsToAdd.push('documentation');
            if (testerChanged) labelsToAdd.push('tester-files');
            if (cssChanged)    labelsToAdd.push('ui');

            // Create any missing labels before applying them
            const existing = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo }
            );
            const existingNames = new Set(existing.map(l => l.name));

            const labelDefs = {
              'feature-branch': '0075ca',
              'release':        'e11d48',
              'app':            '7c3aed',
              'schema':         'ea580c',
              'utils':          '0d9488',
              'documentation':  '0284c7',
              'tester-files':   '65a30d',
              'ui':             'db2777',
            };

            for (const label of labelsToAdd) {
              if (!existingNames.has(label)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: labelDefs[label] || 'cccccc',
                });
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labelsToAdd,
              });
              console.log('Applied labels:', labelsToAdd.join(', '));
            }
