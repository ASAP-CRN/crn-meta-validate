name: Release gate – dev → main

# Stricter checks that run only when dev is being merged into main.
# Acts as the final quality gate before a release goes live on Streamlit Cloud.

on:
  pull_request:
    branches:
      - main

jobs:
  # ── 1. All CI checks (rerun to keep gate self-contained) ──────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check . --select E,F --ignore E501

  smoke:
    name: Smoke-test imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verify utils modules import cleanly
        run: |
          python -c "
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path('.').resolve()))
          from utils import validate, cde, delimiter_handler, find_missing_values
          from utils import help_menus, processed_data_loader, template_files
          print('All utils modules imported successfully.')
          "

  schema:
    name: Validate app_schema JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check all app_schema JSON files
        run: |
          python -c "
          import json, pathlib, sys
          errors = []
          for p in pathlib.Path('resource').glob('app_schema*.json'):
              try:
                  with open(p) as f:
                      json.load(f)
                  print(f'OK: {p.name}')
              except Exception as e:
                  errors.append(f'FAIL: {p.name}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          "

  readme-sync:
    name: README in sync with help_menus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python utils/generate_readme.py -v v0.9.1
      - name: Fail if README.md has uncommitted changes
        run: |
          git diff --exit-code README.md || {
            echo "README.md is out of sync. Run: python utils/generate_readme.py -v v0.9.1"
            exit 1
          }

  # ── 2. Tester-files integrity ──────────────────────────────────────────────
  # Each tester CSV has a documented purpose – some are intentionally malformed
  # to demonstrate error cases the app must surface. The manifest
  # (tester_manifest.json) declares whether each file is expected to parse
  # cleanly or expected to raise an exception. This check validates both
  # outcomes, so adding a broken-on-purpose file never breaks CI.
  tester-files:
    name: Tester CSV files match manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pandas

      - name: Validate tester CSVs against manifest
        run: |
          python -c "
          import json, pandas as pd, pathlib, sys

          manifest_path = pathlib.Path('resource/tester_files/tester_manifest.json')
          tester_dir    = pathlib.Path('resource/tester_files')

          with open(manifest_path) as f:
              manifest = json.load(f)['files']

          csv_files = {p.name for p in tester_dir.glob('*.csv')}
          declared  = set(manifest.keys())

          failures = []

          # Every CSV on disk must have a manifest entry
          for name in sorted(csv_files - declared):
              failures.append(f'MISSING FROM MANIFEST: {name} – add an entry to tester_manifest.json')

          # Every manifest entry must have a file on disk
          for name in sorted(declared - csv_files):
              failures.append(f'MANIFEST ENTRY WITHOUT FILE: {name} – remove from tester_manifest.json or add the file')

          # Validate each declared file against its expected outcome
          for name in sorted(declared & csv_files):
              entry      = manifest[name]
              expect_ok  = entry['expect_parse_ok']
              p          = tester_dir / name
              try:
                  df = pd.read_csv(p)
                  if expect_ok:
                      print(f'OK (parsed):   {name} ({len(df)} rows, {len(df.columns)} cols)')
                  else:
                      failures.append(
                          f'UNEXPECTED PARSE SUCCESS: {name} was expected to fail parsing '
                          f'(reason: {entry[\"reason\"]}) – fix the manifest or the file'
                      )
              except Exception as e:
                  if not expect_ok:
                      print(f'OK (expected error): {name}: {e}')
                  else:
                      failures.append(f'UNEXPECTED PARSE FAILURE: {name}: {e}')

          if failures:
              print()
              for msg in failures:
                  print(f'FAIL: {msg}', file=sys.stderr)
              sys.exit(1)
          "

  # ── 3. Version bump reminder ───────────────────────────────────────────────
  version-check:
    name: Remind about app_schema versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for diff

      - name: Check if app_schema changed without a new versioned file
        run: |
          # Warn (not fail) if app_schema_v0.9.1.json was modified but no new
          # app_schema_v*.json was added – a signal that a version bump may be needed.
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'resource/app_schema*.json')
          ADDED=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'resource/app_schema*.json')
          if [ -n "$CHANGED" ] && [ -z "$ADDED" ]; then
            echo "::warning file=resource/app_schema_v0.9.1.json::app_schema JSON was modified but no new versioned file was added. Consider bumping the schema version."
          else
            echo "Schema versioning looks good."
          fi
