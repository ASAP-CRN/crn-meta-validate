name: Release gate – dev → main

# Stricter checks that run only when dev is being merged into main.
# Acts as the final quality gate before a release goes live on Streamlit Cloud.

on:
  pull_request:
    branches:
      - main

jobs:
  # ── 1. All CI checks (rerun to keep gate self-contained) ──────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check . --select E,F --ignore E501

  smoke:
    name: Smoke-test imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Verify utils modules import cleanly
        run: |
          python -c "
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path('.').resolve()))
          from utils import validate, cde, delimiter_handler, find_missing_values
          from utils import help_menus, processed_data_loader, template_files
          print('All utils modules imported successfully.')
          "

  schema:
    name: Validate app_schema JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check all app_schema JSON files
        run: |
          python -c "
          import json, pathlib, sys
          errors = []
          for p in pathlib.Path('resource').glob('app_schema*.json'):
              try:
                  with open(p) as f:
                      json.load(f)
                  print(f'OK: {p.name}')
              except Exception as e:
                  errors.append(f'FAIL: {p.name}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          "

  readme-sync:
    name: README in sync with help_menus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python utils/generate_readme.py -v v0.9.1
      - name: Fail if README.md has uncommitted changes
        run: |
          git diff --exit-code README.md || {
            echo "README.md is out of sync. Run: python utils/generate_readme.py -v v0.9.1"
            exit 1
          }

  # ── 2. Tester-files integrity ──────────────────────────────────────────────
  tester-files:
    name: Tester CSV files are valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pandas

      - name: Load all tester CSVs with pandas
        run: |
          python -c "
          import pandas as pd, pathlib, sys
          errors = []
          for p in pathlib.Path('resource/tester_files').glob('*.csv'):
              try:
                  df = pd.read_csv(p)
                  print(f'OK: {p.name} ({len(df)} rows, {len(df.columns)} cols)')
              except Exception as e:
                  errors.append(f'FAIL: {p.name}: {e}')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          "

  # ── 3. Version bump reminder ───────────────────────────────────────────────
  version-check:
    name: Remind about app_schema versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for diff

      - name: Check if app_schema changed without a new versioned file
        run: |
          # Warn (not fail) if app_schema_v0.9.1.json was modified but no new
          # app_schema_v*.json was added – a signal that a version bump may be needed.
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'resource/app_schema*.json')
          ADDED=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'resource/app_schema*.json')
          if [ -n "$CHANGED" ] && [ -z "$ADDED" ]; then
            echo "::warning file=resource/app_schema_v0.9.1.json::app_schema JSON was modified but no new versioned file was added. Consider bumping the schema version."
          else
            echo "Schema versioning looks good."
          fi
